<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle Multi-Agent Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/multiagent-assets/styles.css">
</head>
<body>
  <div class="multiagent-app">
    <div class="header">
      <div class="header-left">
        <div class="logo">ORACLE / OPUS</div>
        <span class="mode-badge mode-paper">ISOLATED</span>
      </div>
      <div class="header-right">
        <a href="/" class="header-link">Current Dashboard</a>
        <a href="/multiagent" class="header-link header-link-active">Opus Lab</a>
        <a href="https://docs.polymarket.com" class="header-link" target="_blank" rel="noreferrer">Docs</a>
        <span id="last-update" class="dot-pulse">Connecting...</span>
      </div>
    </div>

    <div class="section-banner">
      <div class="section-banner-left">
        <div class="panel-eyebrow">Separate Oracle Surface</div>
        <div class="section-title-row">
          <h1 id="active-title">Runtime</h1>
          <span class="hero-pill">Opus architecture</span>
        </div>
        <p id="active-description" class="section-description"></p>
      </div>
    </div>

    <section class="stats-row" id="metrics-grid"></section>

    <div class="view-tabs" id="section-tabs"></div>

    <main id="section-content" class="section-content"></main>
  </div>

  <script src="/multiagent-assets/app.js"></script>
</body>
</html>
